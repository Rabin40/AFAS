<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Portal Setup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/teacher_setup.css') }}">
</head>
<body>

    <div class="setup-container">
        <h2>Teacher Portal Setup</h2>

        <p class="subtitle">
            Create login credentials for <b>{{ user.name }}</b>
        </p>

        {% if error %}
            <div class="alert error">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="alert success">{{ success }}</div>
        {% endif %}

        <form method="POST">
            <label>Username</label>
            <input name="username" required placeholder="Choose username">

            <label>Password</label>
            <input type="password" name="password" required placeholder="Create password">

            <label>Confirm Password</label>
            <input type="password" name="confirm_password" required placeholder="Confirm password">

            <button type="submit">Create Teacher Portal</button>
        </form>
    </div>

</body>
</html>
