<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify OTP - AFAS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/afas.css') }}">
</head>
<body>

<div class="login-container">

    <div class="left-panel">
        <h1>AFAS</h1>
        <p>Verify OTP and reset password</p>
    </div>

    <div class="right-panel">
        <h2>Verify OTP</h2>

        {% if success %}
            <div class="success">{{ success }}</div>
        {% endif %}

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('verify_forgot_password') }}">
            <input type="hidden" name="username" value="{{ username }}">

            <label>OTP</label>
            <input name="otp" placeholder="Enter OTP" required>

            <label>New Password</label>
            <input name="new_password" type="password" placeholder="Enter new password" required>

            <label>Confirm Password</label>
            <input name="confirm_password" type="password" placeholder="Confirm new password" required>

            <button type="submit">Reset Password</button>
        </form>

        <div class="forgot">
            <a href="{{ url_for('login') }}">Back to login</a>
        </div>
    </div>

</div>

</body>
</html>
